name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Business-logic tests gate everything. A breaking hyparquet/hyparquet-writer
  # bump (e.g. from Renovate) fails here before it can ship.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build # tsc typecheck + vite build
      - run: npm test

  # Generate the Parquet tiers fresh in CI (raw data is never committed) and
  # publish to GitHub Pages. Only runs on pushes to main, after tests pass.
  deploy:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The raw CSV is committed (data/raw), so the build only runs the
      # pipeline: CSV -> Parquet tiers. No data is invented here.
      - run: npm run generate
      - run: npm run build
        env:
          # Serve from the project-pages sub-path.
          VITE_BASE: /multi-resolution-timeseries-parquet/
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (source: GitHub Actions) on first run, using this
          # workflow's pages:write token — no manual repo-settings step needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
